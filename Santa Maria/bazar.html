<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazar · Itapeva Recicla</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts (Merriweather + Material Symbols) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body {
            font-family: 'Merriweather', serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Estilo para os botões de seleção de tipo */
        .tipo-btn {
            transition: all 0.3s ease;
        }
        .tipo-btn.active-entrada {
            background-color: #22c55e;
            color: white;
            border-color: #22c55e;
            transform: scale(1.05);
        }
        .tipo-btn.active-saida {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
            transform: scale(1.05);
        }
        .tipo-btn:not(.active-entrada):not(.active-saida):hover {
            background-color: #f3f4f6;
            transform: scale(1.02);
        }
    </style>
</head>

<body class="bg-gray-300 min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-md">

        <!-- Card principal -->
        <div class="bg-white rounded-2xl shadow-lg border-b-4 border-blue-700 shadow-xl p-6 md:p-8">

            <!-- Botão Sair elegante -->
            <div class="flex justify-end mb-2">
                <button id="btn-sair" class="text-gray-500 hover:text-orange-400 flex items-center gap-1 text-sm font-semibold transition duration-300">
                    <span class="material-symbols-outlined text-lg">logout</span>
                    <span>Sair</span>
                </button>
            </div>

            <!-- Logo / cabeçalho -->
            <div class="flex flex-col items-center mb-6">
                <div class="bg-orange-400 w-20 h-20 md:w-24 md:h-24 flex items-center justify-center text-white font-bold rounded-2xl text-2xl md:text-3xl hover:scale-105 transition duration-300 ease-in-out shadow-md">
                    <span class="material-symbols-outlined text-4xl">storefront</span>
                </div>
                <h1 class="font-merriweather font-bold text-xl md:text-2xl text-gray-800 mt-3 tracking-tight">
                    Bazar Itapeva
                </h1>
                <p class="text-sm text-gray-500 font-merriweather">registro de movimentações</p>
            </div>

            <!-- Formulário -->
            <form id="bazar-form" class="flex flex-col gap-5">

                <!-- Campo valor (R$) -->
                <div class="flex flex-col gap-1">
                    <label for="valor" class="font-merriweather font-semibold text-gray-700 text-sm md:text-base">
                        Valor (R$)
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-bold">R$</span>
                        <input type="number" id="valor" name="valor" placeholder="0,00" step="0.01" min="0.01"
                            class="border-2 border-gray-300 rounded-xl px-4 py-3 pl-10 w-full focus:border-blue-700 focus:outline-none transition duration-300 placeholder:text-gray-400">
                    </div>
                </div>

                <!-- Tipo: Entrada ou Saída -->
                <div class="flex flex-col gap-2">
                    <label class="font-merriweather font-semibold text-gray-700 text-sm md:text-base">
                        Tipo de movimentação
                    </label>
                    <div class="flex gap-3">
                        <button type="button" id="btn-entrada" 
                            class="tipo-btn flex-1 border-2 border-green-500 rounded-xl px-4 py-3 font-semibold text-green-700 bg-green-50 hover:bg-green-100 transition-all duration-300 flex items-center justify-center gap-2 active-entrada">
                            <span class="material-symbols-outlined">arrow_upward</span>
                            Entrada
                        </button>
                        <button type="button" id="btn-saida" 
                            class="tipo-btn flex-1 border-2 border-red-500 rounded-xl px-4 py-3 font-semibold text-red-700 bg-red-50 hover:bg-red-100 transition-all duration-300 flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">arrow_downward</span>
                            Saída
                        </button>
                    </div>
                    <input type="hidden" id="tipo" name="tipo" value="true">
                </div>

                <!-- Campo motivo -->
                <div class="flex flex-col gap-1">
                    <label for="motivo" class="font-merriweather font-semibold text-gray-700 text-sm md:text-base">
                        Motivo
                    </label>
                    <input type="text" id="motivo" name="motivo" placeholder="Ex: Venda de produtos, compra de estoque..."
                        class="border-2 border-gray-300 rounded-xl px-4 py-3 focus:border-blue-700 focus:outline-none transition duration-300 placeholder:text-gray-400">
                </div>

                <!-- Botão de registrar -->
                <button type="submit"
                    class="bg-blue-700 hover:bg-orange-400 hover:scale-105 transition duration-300 ease-in-out text-white font-bold px-6 py-3 rounded-2xl flex items-center justify-center gap-2 text-base mt-2 shadow-md">
                    <span class="material-symbols-outlined text-xl">save</span>
                    <span>Registrar movimentação</span>
                </button>

                <!-- Rodapé informativo -->
                <p class="text-center text-xs text-gray-400 mt-2 font-merriweather">
                    Preencha todos os campos para registrar
                </p>
            </form>
        </div>

        <!-- Pequeno rodapé com identidade visual -->
        <div class="text-center text-xs text-gray-500 mt-4 font-merriweather">
            <span class="bg-white/60 px-3 py-1 rounded-full">• Santa Maria e Coopersel •</span>
        </div>
    </div>

    <script src="../js/bazar.js"></script>
</body>

</html>
