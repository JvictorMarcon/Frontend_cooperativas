<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Itapeva Recicla</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts (Merriweather + Material Symbols) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=login" />
    <style>
        /* pequeno ajuste para garantir a fonte */
        body {
            font-family: 'Merriweather', serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-gray-300 min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-md">

        <!-- Card principal com o mesmo DNA visual: fundo branco, borda inferior azul, sombra -->
        <div class="bg-white rounded-2xl shadow-lg border-b-4 border-blue-700 shadow-xl p-6 md:p-8">

            <!-- Logo / cabeçalho com o estilo "SM" adaptado para "Itapeva Recila" -->
            <div class="flex flex-col items-center mb-6">
                <div class="bg-orange-400 w-20 h-20 md:w-24 md:h-24 flex items-center justify-center text-white font-bold rounded-2xl text-2xl md:text-3xl hover:scale-105 transition duration-300 ease-in-out shadow-md">
                    IR
                </div>
                <h1 class="font-merriweather font-bold text-xl md:text-2xl text-gray-800 mt-3 tracking-tight">
                    Itapeva Recicla
                </h1>
                <p class="text-sm text-gray-500 font-merriweather">acesso ao sistema</p>
            </div>

            <!-- Formulário de login -->
            <form id="login-form" class="flex flex-col gap-5">

                <!-- Campo usuário -->
                <div class="flex flex-col gap-1">
                    <label for="usuario" class="font-merriweather font-semibold text-gray-700 text-sm md:text-base">
                        Usuário
                    </label>
                    <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário"
                        class="border-2 border-gray-300 rounded-xl px-4 py-3 focus:border-blue-700 focus:outline-none transition duration-300 placeholder:text-gray-400">
                </div>

                <!-- Campo senha -->
                <div class="flex flex-col gap-1">
                    <label for="senha" class="font-merriweather font-semibold text-gray-700 text-sm md:text-base">
                        Senha
                    </label>
                    <input type="password" id="senha" name="senha" placeholder="••••••••"
                        class="border-2 border-gray-300 rounded-xl px-4 py-3 focus:border-blue-700 focus:outline-none transition duration-300 placeholder:text-gray-400">
                </div>

                <!-- Botão de login com ícone + mesmo estilo do botão "Sair" -->
                <button type="submit"
                    class="bg-blue-700 hover:bg-orange-400 hover:scale-105 transition duration-300 ease-in-out text-white font-bold px-6 py-3 rounded-2xl flex items-center justify-center gap-2 text-base mt-2 shadow-md">
                    <span class="material-symbols-outlined text-xl">login</span>
                    <span>Entrar</span>
                </button>

                <!-- Link auxiliar (apenas visual) -->
                <p class="text-center text-xs text-gray-400 mt-2 font-merriweather">
                    Demonstração · use qualquer credencial
                </p>
            </form>
        </div>

        <!-- pequeno rodapé opcional com a identidade visual -->
        <div class="text-center text-xs text-gray-500 mt-4 font-merriweather">
            <span class="bg-white/60 px-3 py-1 rounded-full">• Santa Maria e Coopersel •</span>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
