<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=home,error" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
        rel="stylesheet">
    <title>Erro 404 - Página não encontrada</title>
</head>

<body class="bg-gray-300 min-h-screen p-4 md:p-8 flex items-center justify-center">

    <main class="bg-white w-full md:w-2/3 mx-auto mt-4 rounded-2xl shadow-lg border-b-4 border-blue-700 shadow-xl p-8 md:p-16 text-center flex flex-col items-center gap-6">
        
        <div class="text-blue-700">
            <span class="material-symbols-outlined !text-9xl">error</span>
        </div>

        <h1 class="text-4xl md:text-6xl font-merriweather font-bold text-gray-800">404</h1>
        
        <p class="font-merriweather text-lg md:text-xl text-gray-600">
            Oops! Parece que a página que você está procurando não existe na área das Cooperativas.
        </p>

        <a href="/"
            class="bg-blue-700 hover:bg-orange-400 hover:scale-105 transition duration-300 ease-in-out text-white font-bold px-8 py-3 rounded-2xl flex items-center gap-2 text-base md:text-lg font-merriweather mt-4">
            <span class="material-symbols-outlined">home</span>
            Voltar para o início
        </a>

    </main>

</body>
</html>
